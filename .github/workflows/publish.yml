name: Publish CLI Package to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC Trusted Publisher authentication and provenance signing
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: cli

      - name: Build and Sync templates
        run: npm run build
        working-directory: cli

      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: cli
